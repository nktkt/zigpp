name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build + test (zig 0.15.2, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache zig artifacts
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            ~/.cache/zig
          key: ${{ runner.os }}-zig-0.15.2-${{ hashFiles('build.zig', 'build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-zig-0.15.2-

      - name: zig version
        run: zig version

      - name: zig build
        run: zig build

      - name: zig build test
        run: zig build test

      - name: zig build test-zpp
        run: zig build test-zpp

      - name: smoke - zpp run examples/hello_runnable
        run: |
          out=$(./zig-out/bin/zpp run examples/hello_runnable 2>&1)
          echo "$out"
          echo "$out" | grep -q 'hello, zigpp!'

      - name: smoke - zpp check examples (must be clean)
        run: ./zig-out/bin/zpp check examples

      - name: smoke - zpp fmt --check .
        run: ./zig-out/bin/zpp fmt --check .

      - name: smoke - zpp lsp initialize handshake
        run: |
          content='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"processId":null,"rootUri":null,"capabilities":{}}}'
          len=$(printf '%s' "$content" | wc -c)
          out=$(printf 'Content-Length: %d\r\n\r\n%s' "$len" "$content" | ./zig-out/bin/zpp lsp 2>/dev/null)
          echo "$out" | grep -q '"capabilities"'
